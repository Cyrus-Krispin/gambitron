<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">Gambitron browser-local architecture</title>
  <desc id="desc">The React client contains the chess board and a local game runtime. The runtime uses chess.js and a minimax engine with WebAssembly material scoring, then saves completed games to Supabase or local storage.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 2 L10 6 L2 10 Z" fill="#d69b55"/></marker>
    <style>
      .bg{fill:#201d19}.panel{fill:#29251f;stroke:#544c42;stroke-width:1.4}.node{fill:#211f1b;stroke:#62594d;stroke-width:1.2}.ink{fill:#f1ece4;font:600 19px Inter,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif}.dim{fill:#b9afa2;font:14px Inter,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif}.tiny{fill:#9b9184;font:12px &quot;JetBrains Mono&quot;,&quot;SF Mono&quot;,Menlo,monospace}.mono{fill:#d69b55;font:12px &quot;JetBrains Mono&quot;,&quot;SF Mono&quot;,Menlo,monospace}.heading{fill:#f1ece4;font:400 31px Georgia,&quot;Times New Roman&quot;,serif}.eyebrow{fill:#d69b55;font:12px &quot;JetBrains Mono&quot;,&quot;SF Mono&quot;,Menlo,monospace}.line{stroke:#d69b55;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.line-soft{stroke:#7d6f60;stroke-width:1.5;fill:none;stroke-dasharray:5 6;marker-end:url(#arrow)}.step{fill:#28241f;stroke:#51493f;stroke-width:1}.step-num{fill:#d69b55;font:600 13px &quot;JetBrains Mono&quot;,&quot;SF Mono&quot;,Menlo,monospace}.step-text{fill:#eee8df;font:13px Inter,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif}
    </style>
  </defs>
  <rect class="bg" width="1120" height="660"/>
  <text class="eyebrow" x="56" y="58">Gambitron architecture</text>
  <text class="heading" x="56" y="95">A complete game loop in the browser.</text>
  <text class="dim" x="56" y="123">The client owns play, clocks, and engine turns; Supabase is optional storage for finished games.</text>

  <g transform="translate(56 162)">
    <rect class="panel" width="300" height="300" rx="8"/>
    <text class="ink" x="24" y="42">React client</text><text class="mono" x="24" y="65">TypeScript · Vite · Vercel</text>
    <rect class="node" x="24" y="94" width="252" height="54" rx="6"/><text class="dim" x="44" y="118">Board and game controls</text><text class="tiny" x="44" y="136">moves · clocks · captures</text>
    <rect class="node" x="24" y="166" width="252" height="54" rx="6"/><text class="dim" x="44" y="190">History and replay</text><text class="tiny" x="44" y="208">positions · notation · playback</text>
    <rect class="node" x="24" y="238" width="252" height="38" rx="6"/><text class="dim" x="44" y="262">Local socket-compatible API</text>
  </g>
  <g transform="translate(410 162)">
    <rect class="panel" width="300" height="300" rx="8"/>
    <text class="ink" x="24" y="42">Local game runtime</text><text class="mono" x="24" y="65">in-memory browser session</text>
    <rect class="node" x="24" y="94" width="252" height="54" rx="6"/><text class="dim" x="44" y="118">chess.js game state</text><text class="tiny" x="44" y="136">legal moves · FEN · SAN</text>
    <rect class="node" x="24" y="166" width="252" height="54" rx="6"/><text class="dim" x="44" y="190">Clock and turn orchestration</text><text class="tiny" x="44" y="208">time controls · AI replies</text>
    <rect class="node" x="24" y="238" width="252" height="38" rx="6"/><text class="dim" x="44" y="262">Session messages and events</text>
  </g>
  <g transform="translate(764 162)">
    <rect class="panel" width="300" height="300" rx="8"/>
    <text class="ink" x="24" y="42">Engine and storage</text><text class="mono" x="24" y="65">browser compute · optional persistence</text>
    <rect class="node" x="24" y="94" width="252" height="54" rx="6"/><text class="dim" x="44" y="118">Minimax search</text><text class="tiny" x="44" y="136">alpha-beta · move ordering</text>
    <rect class="node" x="24" y="166" width="252" height="54" rx="6"/><text class="dim" x="44" y="190">WebAssembly evaluation</text><text class="tiny" x="44" y="208">material scoring</text>
    <rect class="node" x="24" y="238" width="252" height="38" rx="6"/><text class="dim" x="44" y="262">Supabase or localStorage history</text>
  </g>
  <path class="line" d="M356 282 H410"/><text class="tiny" x="369" y="266">messages</text>
  <path class="line" d="M710 282 H764"/><text class="tiny" x="719" y="266">AI turn</text>
  <path class="line-soft" d="M710 400 H764"/><text class="tiny" x="718" y="424">completed game</text>
  <path class="line-soft" d="M764 430 C685 485 430 485 356 430"/><text class="tiny" x="486" y="496">saved history and replay</text>
  <g transform="translate(56 530)">
    <text class="eyebrow" x="0" y="-18">Move lifecycle</text>
    <rect class="step" x="0" y="0" width="180" height="70" rx="7"/><text class="step-num" x="18" y="27">01</text><text class="step-text" x="54" y="27">Start game</text><text class="tiny" x="18" y="50">side + time control</text>
    <path class="line" d="M185 35 H215"/>
    <rect class="step" x="220" y="0" width="180" height="70" rx="7"/><text class="step-num" x="238" y="27">02</text><text class="step-text" x="274" y="27">Player move</text><text class="tiny" x="238" y="50">validate with chess.js</text>
    <path class="line" d="M405 35 H435"/>
    <rect class="step" x="440" y="0" width="180" height="70" rx="7"/><text class="step-num" x="458" y="27">03</text><text class="step-text" x="494" y="27">Engine search</text><text class="tiny" x="458" y="50">minimax + WASM</text>
    <path class="line" d="M625 35 H655"/>
    <rect class="step" x="660" y="0" width="180" height="70" rx="7"/><text class="step-num" x="678" y="27">04</text><text class="step-text" x="714" y="27">AI reply</text><text class="tiny" x="678" y="50">board + clocks update</text>
    <path class="line" d="M845 35 H875"/>
    <rect class="step" x="880" y="0" width="180" height="70" rx="7"/><text class="step-num" x="898" y="27">05</text><text class="step-text" x="934" y="27">Save result</text><text class="tiny" x="898" y="50">history + replay</text>
  </g>
</svg>
