name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner | lower }}/gambitron-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha-tag: ${{ steps.sha-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: sha-tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.sha-tag.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Production
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stderr: true
          envs: IMAGE_NAME,SHA_TAG,GHCR_TOKEN,GITHUB_ACTOR
          script: |
            set -e

            IMAGE="ghcr.io/${IMAGE_NAME}"
            SHA_IMAGE="${IMAGE}:${SHA_TAG}"
            LATEST_IMAGE="${IMAGE}:latest"

            # Log in to GHCR on the EC2 host
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # Save the currently running image tag for rollback before pulling new image
            CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' gambitron-backend 2>/dev/null || true)
            if [ -n "${CURRENT_IMAGE}" ]; then
              echo "${CURRENT_IMAGE}" > /opt/gambitron/previous-image.txt
              echo "Saved rollback image: ${CURRENT_IMAGE}"
            fi

            # Pull new images (SHA tag for reproducibility, latest as convenience alias)
            docker pull "${SHA_IMAGE}"
            docker pull "${LATEST_IMAGE}"

            # Swap container atomically: stop old, start new
            docker stop gambitron-backend 2>/dev/null || true
            docker rm   gambitron-backend 2>/dev/null || true

            docker run -d \
              --name gambitron-backend \
              --restart unless-stopped \
              --env-file /opt/gambitron/.env \
              -p 127.0.0.1:8000:8000 \
              "${SHA_IMAGE}"

            # Wait for uvicorn to be ready (up to 30s)
            echo "Waiting for health check..."
            for i in $(seq 1 10); do
              if curl -sf http://127.0.0.1:8000/health > /dev/null; then
                echo "Health check passed."
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "ERROR: Health check failed after 10 attempts. Rolling back..."
                docker stop gambitron-backend 2>/dev/null || true
                docker rm   gambitron-backend 2>/dev/null || true
                ROLLBACK_IMAGE=$(cat /opt/gambitron/previous-image.txt 2>/dev/null || true)
                if [ -n "${ROLLBACK_IMAGE}" ]; then
                  docker run -d \
                    --name gambitron-backend \
                    --restart unless-stopped \
                    --env-file /opt/gambitron/.env \
                    -p 127.0.0.1:8000:8000 \
                    "${ROLLBACK_IMAGE}"
                  echo "Rolled back to ${ROLLBACK_IMAGE}"
                fi
                exit 1
              fi
              sleep 3
            done

            echo "Deployed ${SHA_IMAGE} successfully."
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SHA_TAG: ${{ needs.build-and-push.outputs.sha-tag }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
